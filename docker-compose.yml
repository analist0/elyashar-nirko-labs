services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_AGENT_URL: "${NEXT_PUBLIC_AGENT_URL:-}"
    image: joseph-portfolio:latest
    container_name: joseph-portfolio
    restart: unless-stopped
    ports:
      - "3003:3003"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/"]
      interval: 30s
      timeout: 5s
      retries: 3
