server {
    listen 3003;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API proxy — forward /api, /chat, /admin, /webhook, /messages, /comments, /lead, /health to Node.js API
    location ~ ^/(api|chat|admin|webhook|messages|comments|lead|health) {
        proxy_pass http://host.docker.internal:3004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Next.js static export with trailingSlash: true
    # Each route is a directory with index.html
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    error_page 404 /404/index.html;
}
