server {
    listen 3003;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Defense in depth for the blog content pipeline: post bodies are LLM-generated
    # and admin-editable (see api/server.js /admin/posts), then rendered via
    # dangerouslySetInnerHTML after sanitization (src/lib/sanitizeHtml.ts). CSP
    # limits the blast radius if anything ever slips past that sanitizer.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://agent.elyasharlabs.com; frame-ancestors 'none'; base-uri 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API proxy — forward /api, /chat, /admin, /webhook, /messages, /comments, /lead, /health to Node.js API
    location ~ ^/(api|chat|admin|webhook|messages|comments|lead|health) {
        proxy_pass http://host.docker.internal:3004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Next.js static export with trailingSlash: true
    # Each route is a directory with index.html
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    error_page 404 /404/index.html;
}
