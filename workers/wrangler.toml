name = "joseph-portfolio-agent"
main = "sales-agent.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

# Secrets — set via CLI (never commit to repo):
#   npx wrangler secret put TELEGRAM_BOT_TOKEN
#   npx wrangler secret put TELEGRAM_CHAT_ID
#
# Deploy:
#   npx wrangler deploy
#
# After deploy, set NEXT_PUBLIC_AGENT_URL in .env.local to the worker URL:
#   NEXT_PUBLIC_AGENT_URL=https://joseph-portfolio-agent.<your-subdomain>.workers.dev
