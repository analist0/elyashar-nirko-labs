name: Ultra Content Machine — Daily Blog Generation (Test/Backup)

# WARNING: This workflow is for TESTING and BACKUP only.
# The production site is served from the owner's private server.
# GitHub is used solely for project backup and maintenance.

on:
  schedule:
    # 9:00 AM Israel time (UTC+3) = 6:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      manual_trigger:
        description: 'Trigger manual generation (test mode)'
        required: false
        default: 'true'

permissions:
  contents: read

jobs:
  generate-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm install -g tsx

      - name: Setup environment
        run: |
          echo "FAL_KEY=${{ secrets.FAL_KEY }}" >> .env.local
          echo "OLLAMA_API_KEY=${{ secrets.OLLAMA_API_KEY }}" >> .env.local
          echo "OLLAMA_MODEL=${{ secrets.OLLAMA_MODEL || 'kimi-k2.5' }}" >> .env.local
          echo "CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}" >> .env.local
          echo "CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" >> .env.local
          echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> .env.local

      - name: Generate ultra blog post
        run: |
          echo "Starting Ultra Content Machine (TEST MODE)..."
          npx tsx scripts/generate-content.ts
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Check for new content
        id: verify
        run: |
          if [ -n "$(git status --porcelain content/ public/images/)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "New ultra-guide generated!"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No new content today"
          fi

      # NOTE: No deployment to GitHub Pages. The production site runs on the owner's server.
      # Content generated here is for testing/backup only and must be pulled to the server manually.
